<div class="d-flex justify-content-between align-items-center mb-3">

  <h2>Détails Chauffeur</h2>

  <button class="btn btn-primary" (click)="refresh()">
    Actualiser
  </button>

</div>

<!-- ERROR -->
<div *ngIf="error" class="alert alert-danger">
  {{ error }}
</div>

<!-- LOADING -->
<div *ngIf="loading" class="text-center">
  Loading...
</div>

<!-- DATA -->
<div *ngIf="chauffeur" class="card p-3">

  <p><strong>ID:</strong> {{ chauffeur.id }}</p>
  <p><strong>CIN:</strong> {{ chauffeur.cin }}</p>
  <p><strong>Nom:</strong> {{ chauffeur.nom }}</p>
  <p><strong>Prénom:</strong> {{ chauffeur.prenom }}</p>
  <p><strong>Email:</strong> {{ chauffeur.email }}</p>

  <p><strong>Matricule:</strong> {{ chauffeur.matricule }}</p>
  <p><strong>Password:</strong> {{ chauffeur.psw }}</p>

</div>
