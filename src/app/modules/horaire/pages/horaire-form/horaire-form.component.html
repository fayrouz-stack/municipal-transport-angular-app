<div class="container p-4" style="max-width: 600px">
  <h4>{{ isEditMode ? 'Modifier' : 'Ajouter' }} un Horaire</h4>

  <form (ngSubmit)="save()" #f="ngForm">
    <div class="mb-3">
      <label class="form-label">Date du voyage</label>
      <input type="date" class="form-control" name="date_voyage" [(ngModel)]="horaire.date_voyage" required />
    </div>
    <div class="mb-3">
      <label class="form-label">Heure de départ</label>
      <input type="time" class="form-control" name="horaire_depart" [(ngModel)]="horaire.horaire_depart" required />
    </div>
    <div class="mb-3">
      <label class="form-label">Heure d'arrivée</label>
      <input type="time" class="form-control" name="horaire_arrive" [(ngModel)]="horaire.horaire_arrive" required />
    </div>
    <div class="mb-3">
      <label class="form-label">Retard estimé (minutes)</label>
      <input type="number" class="form-control" name="retard_estime" [(ngModel)]="horaire.retard_estime" min="0" />
    </div>
    <div class="d-flex gap-2">
      <button type="submit" class="btn btn-primary" [disabled]="f.invalid || loading">
        {{ isEditMode ? 'Mettre à jour' : 'Enregistrer' }}
      </button>
      <a routerLink="/horaires" class="btn btn-secondary">Annuler</a>
    </div>
  </form>
</div>
