<div class="container-fluid p-4">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h4>🗯️ Gestion des Lignes</h4>
    <a routerLink="/lignes/add" class="btn btn-primary">➕ Nouvelle ligne</a>
  </div>

  <div class="mb-3">
    <input type="text" class="form-control w-auto" [(ngModel)]="search" (ngModelChange)="applyFilter()"
           placeholder="Rechercher numéro ou destination..." />
  </div>

  <div *ngIf="loading" class="text-center py-4">
    <div class="spinner-border text-primary" role="status"></div>
    <p class="mt-2 text-muted">Chargement...</p>
  </div>

  <div class="table-responsive" *ngIf="!loading">
    <table class="table table-hover table-striped align-middle">
      <thead class="table-dark">
        <tr>
          <th>#</th>
          <th>Numéro</th>
          <th>Destination</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let l of filtered">
          <td><span class="badge bg-secondary">{{ l.id }}</span></td>
          <td><span class="badge bg-primary fs-6">{{ l.numero }}</span></td>
          <td>{{ l.destination }}</td>
          <td>
            <button class="btn btn-sm btn-outline-warning me-1" (click)="edit(l.id)">✏️ Modifier</button>
            <button class="btn btn-sm btn-outline-danger" (click)="delete(l.id)">🗑️ Supprimer</button>
          </td>
        </tr>
        <tr *ngIf="filtered.length === 0">
          <td colspan="4" class="text-center text-muted py-3">Aucune ligne trouvée</td>
        </tr>
      </tbody>
    </table>
    <small class="text-muted">{{ filtered.length }} ligne(s)</small>
  </div>
</div>
