<div class="container p-4" style="max-width:600px">
  <h4>{{ isEdit ? '✏️ Modifier' : '➕ Nouvelle' }} station</h4>
  <form (ngSubmit)="save()" #f="ngForm">
    <div class="mb-3">
      <label class="form-label fw-semibold">Nom de la station</label>
      <input type="text" class="form-control" [(ngModel)]="station.nom" name="nom"
             required placeholder="Ex: Gare Tunis" />
    </div>
    <div class="mb-3">
      <label class="form-label fw-semibold">Adresse</label>
      <input type="text" class="form-control" [(ngModel)]="station.adresse" name="adresse"
             required placeholder="Ex: Place Barcelone" />
    </div>
    <div class="mb-3">
      <label class="form-label fw-semibold">Ville</label>
      <input type="text" class="form-control" [(ngModel)]="station.ville" name="ville"
             required placeholder="Ex: Tunis" />
    </div>
    <div class="d-flex gap-2">
      <button type="submit" class="btn btn-primary" [disabled]="f.invalid">Enregistrer</button>
      <a routerLink="/stations" class="btn btn-secondary">Annuler</a>
    </div>
  </form>
</div>
