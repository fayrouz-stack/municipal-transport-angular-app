<div class="container mt-4">
  <div class="card">
    <div class="card-header bg-primary text-white">
      <h3>{{ isEditMode ? 'Modifier' : 'Ajouter' }} un voyage</h3>
    </div>
    <div class="card-body">
      <form (ngSubmit)="save()">
        <div *ngIf="validationError" class="alert alert-danger">{{ validationError }}</div>

        <div class="mb-3">
          <label class="form-label">Date du voyage</label>
          <input type="date" class="form-control" [(ngModel)]="voyage.dateVoyage" name="dateVoyage" required>
        </div>

        <div class="mb-3">
          <label class="form-label">Nombre de places</label>
          <input type="number" class="form-control" [(ngModel)]="voyage.nombrePlacesDisponible" name="places" required>
        </div>

        <div class="mb-3">
          <label class="form-label">Prix (DT)</label>
          <input type="number" step="0.01" class="form-control" [(ngModel)]="voyage.prix" name="prix" required>
        </div>

        <div class="mb-3">
          <label class="form-label">Ligne</label>
          <select class="form-select" [(ngModel)]="voyage.ligneId" name="ligneId" required>
            <option [ngValue]="0">-- Choisir une ligne --</option>
            <option *ngFor="let ligne of lignes" [ngValue]="ligne.id">{{ ligne.numero }} - {{ ligne.destination }}</option>
          </select>
        </div>

        <div class="mb-3">
          <label class="form-label">Horaire</label>
          <select class="form-select" [(ngModel)]="voyage.horaireId" name="horaireId" required>
            <option [ngValue]="0">-- Choisir un horaire --</option>
            <option *ngFor="let horaire of horaires" [ngValue]="horaire.id">{{ horaire.date_voyage }} | {{ horaire.horaire_depart }} → {{ horaire.horaire_arrive }}</option>
          </select>
        </div>

        <div class="mb-3">
          <label class="form-label">Véhicule</label>
          <select class="form-select" [(ngModel)]="voyage.vehiculeId" name="vehiculeId" required>
            <option [ngValue]="0">-- Choisir un véhicule --</option>
            <option *ngFor="let vehicule of vehicules" [ngValue]="vehicule.id">{{ vehicule.marque }} {{ vehicule.type_vehicule }} ({{ vehicule.matriculeFourni }})</option>
          </select>
        </div>

        <div class="mb-3">
          <label class="form-label">Chauffeur</label>
          <select class="form-select" [(ngModel)]="voyage.chauffeurMatricule" name="chauffeurMatricule" required>
            <option [ngValue]="''">-- Choisir un chauffeur --</option>
            <option *ngFor="let chauffeur of chauffeurs" [ngValue]="chauffeur.matricule">{{ chauffeur.nom }} {{ chauffeur.prenom }}</option>
          </select>
        </div>

        <div class="mt-3">
          <button type="submit" class="btn btn-primary">Enregistrer</button>
          <a routerLink="/voyages" class="btn btn-secondary ms-2">Annuler</a>
        </div>
      </form>
    </div>
  </div>
</div>
