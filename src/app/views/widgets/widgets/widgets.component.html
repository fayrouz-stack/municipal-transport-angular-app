<c-card class="mb-4">
  <c-card-header>Tableau de bord - Gestion de flotte</c-card-header>
  <c-card-body>
    <app-docs-example href="components/widgets/#cwidgetstatsa">
      <app-widgets-dropdown />
    </app-docs-example>
    
    <!-- Statistiques flotte - Version standard -->
    <app-docs-example href="components/widgets/#cwidgetstatsb">
      <c-row class="g-4">
        <c-col xl="3" md="6" sm="6">
          <c-widget-stat-b
            [title]="'Véhicules'"
            text="Véhicules en circulation"
            value="42"
          >
            <c-progress class="my-2" thin [value]="75" color="success" />
          </c-widget-stat-b>
        </c-col>
        <c-col xl="3" md="6" sm="6">
          <c-widget-stat-b
            [title]="'Chauffeurs'"
            text="Chauffeurs actifs"
            value="38"
          >
            <c-progress class="my-2" thin [value]="68" color="info" />
          </c-widget-stat-b>
        </c-col>
        <c-col xl="3" md="6" sm="6">
          <c-widget-stat-b
            [title]="'Voyages'"
            text="Voyages ce mois"
            value="1,247"
          >
            <c-progress class="my-2" thin [value]="82" color="warning" />
          </c-widget-stat-b>
        </c-col>
        <c-col xl="3" md="6" sm="6">
          <c-widget-stat-b
            [title]="'Kilométrage'"
            text="Km parcourus (mois)"
            value="15,432 km"
          >
            <c-progress class="my-2" thin [value]="64" color="primary" />
          </c-widget-stat-b>
        </c-col>
      </c-row>
    </app-docs-example>

    <!-- Widgets statistiques avec footer -->
    <app-docs-example href="components/widgets/#cwidgetstatsf">
      <c-row class="g-4">
        <c-col xl="3" md="6" sm="6">
          <c-widget-stat-f
            [title]="'Véhicules'"
            color="primary"
            padding
            value="42"
          >
            <ng-template cTemplateId="widgetIconTemplate">
              <svg cIcon name="cilTruck" size="xl" width="24"></svg>
            </ng-template>
            <ng-template cTemplateId="widgetFooterTemplate">
              <a class="font-weight-bold font-xs text-body-secondary"
                 href="/vehicles"
                 rel="noopener norefferer">
                Voir détails
                <svg cIcon class="float-end" name="cilArrowRight" width="16"></svg>
              </a>
            </ng-template>
          </c-widget-stat-f>
        </c-col>
        <c-col xl="3" md="6" sm="6">
          <c-widget-stat-f
            [title]="'Chauffeurs'"
            color="info"
            padding
            value="38"
          >
            <ng-template cTemplateId="widgetIconTemplate">
              <svg cIcon name="cilPeople" size="xl" width="24"></svg>
            </ng-template>
            <ng-template cTemplateId="widgetFooterTemplate">
              <a class="font-weight-bold font-xs text-body-secondary"
                 href="/drivers"
                 rel="noopener norefferer">
                Gérer les chauffeurs
                <svg cIcon class="float-end" name="cilArrowRight" width="16"></svg>
              </a>
            </ng-template>
          </c-widget-stat-f>
        </c-col>
        <c-col xl="3" md="6" sm="6">
          <c-widget-stat-f
            [title]="'Entretien'"
            color="warning"
            padding
            value="3"
          >
            <ng-template cTemplateId="widgetIconTemplate">
              <svg cIcon name="cilSettings" size="xl" width="24"></svg>
            </ng-template>
            <ng-template cTemplateId="widgetFooterTemplate">
              <a class="font-weight-bold font-xs text-body-secondary"
                 href="/maintenance"
                 rel="noopener norefferer">
                Vidanges prévues
                <svg cIcon class="float-end" name="cilArrowRight" width="16"></svg>
              </a>
            </ng-template>
          </c-widget-stat-f>
        </c-col>
        <c-col xl="3" md="6" sm="6">
          <c-widget-stat-f
            [title]="'Alertes'"
            color="danger"
            padding
            value="5"
          >
            <ng-template cTemplateId="widgetIconTemplate">
              <svg cIcon name="cilBell" size="xl" width="24"></svg>
            </ng-template>
            <ng-template cTemplateId="widgetFooterTemplate">
              <a class="font-weight-bold font-xs text-body-secondary"
                 href="/alerts"
                 rel="noopener norefferer">
                Voir les alertes
                <svg cIcon class="float-end" name="cilArrowRight" width="16"></svg>
              </a>
            </ng-template>
          </c-widget-stat-f>
        </c-col>
      </c-row>
    </app-docs-example>
